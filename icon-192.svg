<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="lettergrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a9fd4"/>
      <stop offset="100%" style="stop-color:#4a7c9e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#4a7c9e;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#4a7c9e;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- Ambient glow -->
  <ellipse cx="96" cy="80" rx="90" ry="80" fill="url(#glow)"/>
  <!--
    MK monogram — drawn as paths for crisp rendering
    M: left post down, V-notch, right post down
    K: left post down, diagonal up-right, diagonal down-right
  -->
  <!-- M -->
  <path d="M28 138 L28 58 L48 58 L68 98 L88 58 L108 58 L108 138 L88 138 L88 90 L72 126 L64 126 L48 90 L48 138 Z"
        fill="url(#lettergrad)"
        filter="drop-shadow(0 0 8px rgba(90,159,212,0.5))"/>
  <!-- K -->
  <path d="M118 58 L118 138 L138 138 L138 106 L162 138 L184 138 L156 96 L182 58 L160 58 L138 88 L138 58 Z"
        fill="url(#lettergrad)"
        filter="drop-shadow(0 0 8px rgba(90,159,212,0.5))"/>
</svg>
